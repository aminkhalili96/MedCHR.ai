<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — MedCHR.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAF9F5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 40px 32px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .logo p {
      font-size: 13px;
      color: #6b6b6b;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d0c9;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #FAF9F5;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #d97756;
      box-shadow: 0 0 0 3px rgba(217, 119, 86, 0.12);
    }
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #333; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #9b9b9b;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>MedCHR.ai</h1>
        <p>Sign in to your account</p>
      </div>

      <div id="errorMsg" class="error-msg" role="alert"></div>

      <form id="loginForm" method="POST" action="/ui/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>
    </div>
    <div class="footer">
      <p>MedCHR.ai &mdash; AI-powered Client Health Reports</p>
    </div>
  </div>
  <script nonce="{{ csp_nonce }}">
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'invalid') {
      errorMsg.textContent = 'Invalid email or password. Please try again.';
      errorMsg.classList.add('visible');
    } else if (params.get('error') === 'session') {
      errorMsg.textContent = 'Your session has expired. Please sign in again.';
      errorMsg.classList.add('visible');
    }

    form.addEventListener('submit', function() {
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';
    });
  </script>
</body>
</html>
